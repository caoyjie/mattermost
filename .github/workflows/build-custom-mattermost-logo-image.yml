name: Build Custom Mattermost Logo Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag, e.g. logo-20260404-1"
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./server/build/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ghcr.io/caoyjie/mattermost-custom:${{ inputs.image_tag }}
