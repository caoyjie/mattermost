name: Build Custom Mattermost Logo Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag, e.g. logo-20260404-2"
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build-package:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'webapp/package-lock.json'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'server/go.mod'

      - name: Build source package
        env:
          BUILD_NUMBER: "${{ github.ref_name }}-${{ github.run_id }}"
          FIPS_ENABLED: "false"
        run: |
          make setup-go-work
          make config-reset
          make build-client
          make build-cmd-linux
          make package-linux-amd64
          ls -lh dist/mattermost-team-linux-amd64.tar.gz

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: mattermost-team-linux-amd64-package
          path: server/dist/mattermost-team-linux-amd64.tar.gz
          if-no-files-found: error

  build-and-push:
    runs-on: ubuntu-22.04
    needs: build-package
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: mattermost-team-linux-amd64-package
          path: server/dist

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./server/build/Dockerfile.custom-package
          push: true
          platforms: linux/amd64
          tags: ghcr.io/caoyjie/mattermost-custom:${{ inputs.image_tag }}
